name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.cxx }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        cxx: [g++-15, g++-16, clang++-19, clang++-20, clang++-21, clang++-22]
    container:
      image: debian:trixie
    env:
      DEBIAN_FRONTEND: noninteractive
      CXX: ${{ matrix.cxx }}
      VK_LOADER_DRIVERS_SELECT: lvp_icd.json

    steps:
      - uses: actions/checkout@v7

      - name: Install toolchain and deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates wget gnupg

          # Newer gcc lives in sid; newer clang in apt.llvm.org.
          echo "deb http://deb.debian.org/debian sid main" \
            > /etc/apt/sources.list.d/sid.list
          case "$CXX" in clang*)
            wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
              | tee /etc/apt/trusted.gpg.d/llvm.asc > /dev/null
            version=$(echo "$CXX" | sed 's/.*-//')
            echo "deb http://apt.llvm.org/trixie/ llvm-toolchain-trixie-$version main" \
              > /etc/apt/sources.list.d/llvm.list
            ;;
          esac
          apt-get update

          pkg=$(echo "$CXX" | sed 's/clang++/clang/')
          apt-get install -y --no-install-recommends g++-15 $pkg \
            git python3 python3-pip python-is-python3 nodejs just \
            ninja-build pkg-config unifdef \
            libvulkan-dev mesa-vulkan-drivers \
            glslang-dev glslang-tools spirv-headers spirv-tools \
            libfmt-dev libglfw3-dev \
            libxkbcommon-dev libwayland-dev xorg-dev \
            xvfb xauth
          pip install --break-system-packages 'cmake>=4.0,<5'

          cc=$(echo "$CXX" | sed 's/^g++/gcc/; s/^clang++/clang/')
          echo "CC=$cc" >> "$GITHUB_ENV"

      - name: Install up-to-date Vulkan headers
        env:
          VULKAN_HEADERS_TAG: v1.4.350
        run: |
          git clone --depth 1 --branch "$VULKAN_HEADERS_TAG" \
            https://github.com/KhronosGroup/Vulkan-Headers.git /tmp/vk-headers
          cmake -G Ninja -S /tmp/vk-headers -B /tmp/vk-headers/build \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --install /tmp/vk-headers/build

      - name: Build library
        run: |
          # CMAKE_HAVE_LIBC_PTHREAD bypasses a probe that fails on clang-20's
          # apt.llvm.org snapshot but is trivially true on glibc >= 2.34.
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_LINKER_TYPE=DEFAULT \
            -DCMAKE_CXX_SCAN_FOR_MODULES=OFF \
            -DCMAKE_HAVE_LIBC_PTHREAD=ON \
            .
          cmake --build build -j

      - name: Compile-time tests
        run: just compile $CXX

      - name: DSL runtime tests
        env:
          XDG_RUNTIME_DIR: /tmp/xdg-runtime
        run: |
          mkdir -p "$XDG_RUNTIME_DIR" && chmod 700 "$XDG_RUNTIME_DIR"
          xvfb-run -a just dsl
